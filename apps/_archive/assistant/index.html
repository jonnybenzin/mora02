<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mora02 System Assistant</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-main: #2b2b2b;
            --bg-user-message: #1b1b1b;
            --bg-input: #363636;
            --text-primary: #e0e0e0;
            --text-secondary: #888888;
            --text-muted: #666666;
            --btn-bg: #000000;
            --btn-text: #ffffff;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to bottom, var(--bg-main) 0%, var(--bg-main) 60%, transparent 100%);
            padding: 24px 20px 20px;
            text-align: center;
            z-index: 100;
        }

        .logo {
            width: 180px;
            height: auto;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 100px 40px 140px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        /* Messages */
        .message {
            max-width: 80%;
            font-size: 14px;
            line-height: 1.7;
            font-weight: 400;
        }

        /* Bot messages - LEFT, directly on background */
        .message-bot {
            align-self: flex-start;
            color: var(--text-secondary);
            padding: 0;
        }

        .message-bot strong {
            font-weight: 800;
            color: var(--text-primary);
        }

        .message-bot code {
            background: var(--bg-user-message);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 13px;
        }

        .message-bot pre {
            background: var(--bg-user-message);
            padding: 16px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 12px 0;
        }

        .message-bot pre code {
            background: transparent;
            padding: 0;
        }

        /* User messages - RIGHT, in dark box */
        .message-user {
            align-self: flex-end;
            background: var(--bg-user-message);
            color: var(--text-primary);
            padding: 16px 20px;
            border-radius: 4px;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 0;
            align-self: flex-start;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input Area */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 40px 24px;
        }

        .input-wrapper {
            max-width: 820px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 0;
            background: var(--bg-input);
            border-radius: 8px;
            padding: 12px 16px;
            box-shadow: 5px 5px 20px 0px rgba(0, 0, 0, 0.5);
        }

        .btn-attach {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--btn-bg);
            color: var(--btn-text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 20px;
            font-weight: 400;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-attach:hover {
            opacity: 0.8;
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            min-height: 36px;
            max-height: 150px;
            padding: 8px 16px;
            line-height: 1.5;
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .btn-send {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--btn-bg);
            color: var(--btn-text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-send:hover {
            opacity: 0.8;
        }

        .btn-send:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Arrow icon */
        .btn-send svg {
            width: 16px;
            height: 16px;
            fill: var(--btn-text);
        }

        /* Hidden file input */
        .file-input {
            display: none;
        }

        /* Image preview */
        .image-preview {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-input);
            padding: 12px;
            border-radius: 8px;
            display: none;
            align-items: center;
            gap: 12px;
            max-width: 300px;
            box-shadow: 5px 5px 20px 0px rgba(0, 0, 0, 0.5);
        }

        .image-preview.active {
            display: flex;
        }

        .image-preview img {
            max-width: 100px;
            max-height: 60px;
            border-radius: 4px;
        }

        .image-preview .remove {
            background: var(--btn-bg);
            border: none;
            color: var(--btn-text);
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
        }

        .image-preview .remove:hover {
            opacity: 0.8;
        }

        /* Message with image */
        .message-image {
            max-width: 200px;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        /* Error message */
        .message.error {
            color: #ff6666;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-main);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-input);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>
    <header class="header">
        <img src="logo.png" alt="MORA02" class="logo">
        <div class="subtitle">system_bot</div>
    </header>

    <div class="chat-container" id="chatContainer">
        <!-- Messages will be added here -->
    </div>

    <div class="image-preview" id="imagePreview">
        <img id="previewImg" src="" alt="Preview">
        <span id="previewName">image.png</span>
        <button class="remove" onclick="removeImage()">✕</button>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <button class="btn-attach" onclick="document.getElementById('fileInput').click()" title="Bild anhängen">
                +
            </button>
            <input type="file" id="fileInput" class="file-input" accept="image/*" onchange="handleFileSelect(event)">
            <textarea 
                class="input-field" 
                id="messageInput" 
                placeholder="Nachricht eingeben..." 
                rows="1"
                onkeydown="handleKeyDown(event)"
                oninput="autoResize(this)"
            ></textarea>
            <button class="btn-send" id="sendBtn" onclick="sendMessage()" title="Senden">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8-8-8z" transform="rotate(-90 12 12)"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // Configuration
        const DIFY_API_URL = 'http://localhost:8091/v1';
        const DIFY_API_KEY = 'app-gt1QxF3wVavPrAGbzvMDSAcS';
        const VISION_API_URL = 'http://localhost:8095/vision';
        
        let conversationId = null;
        let pendingImage = null;
        
        // Auto-resize textarea
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
        }
        
        // Handle Enter key
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        // Handle file selection
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                alert('Bitte nur Bilder hochladen');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                pendingImage = {
                    data: e.target.result.split(',')[1],
                    type: file.type,
                    name: file.name
                };
                
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('previewName').textContent = file.name;
                document.getElementById('imagePreview').classList.add('active');
            };
            reader.readAsDataURL(file);
        }
        
        // Remove pending image
        function removeImage() {
            pendingImage = null;
            document.getElementById('imagePreview').classList.remove('active');
            document.getElementById('fileInput').value = '';
        }
        
        // Add message to chat
        function addMessage(content, isUser, imageUrl = null) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'message-user' : 'message-bot'}`;
            
            let html = '';
            if (imageUrl) {
                html += `<img src="${imageUrl}" class="message-image" alt="Uploaded image"><br>`;
            }
            
            if (!isUser) {
                html += formatMessage(content);
            } else {
                html += escapeHtml(content);
            }
            
            div.innerHTML = html;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            
            return div;
        }
        
        // Update message content (for streaming)
        function updateMessage(element, content) {
            element.innerHTML = formatMessage(content);
            document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
        }
        
        // Format bot message (simple markdown)
        function formatMessage(text) {
            let html = escapeHtml(text);
            html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\n/g, '<br>');
            return html;
        }
        
        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Show typing indicator
        function showTyping() {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typingIndicator';
            div.innerHTML = '<span></span><span></span><span></span>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        // Hide typing indicator
        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }
        
        // Send message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message && !pendingImage) return;
            
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            
            const imageDataUrl = pendingImage ? `data:${pendingImage.type};base64,${pendingImage.data}` : null;
            addMessage(message || '[Bild]', true, imageDataUrl);
            
            input.value = '';
            autoResize(input);
            
            showTyping();
            
            try {
                if (pendingImage) {
                    // Vision API for images
                    const visionResponse = await fetch(VISION_API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            image: pendingImage.data,
                            media_type: pendingImage.type,
                            prompt: message || 'Beschreibe dieses Bild detailliert. Falls es ein Screenshot mit einem Fehler ist, erkläre das Problem und mögliche Lösungen.'
                        })
                    });
                    
                    const visionResult = await visionResponse.json();
                    
                    if (visionResult.status === 'ok') {
                        hideTyping();
                        addMessage(visionResult.analysis, false);
                    } else {
                        throw new Error(visionResult.message || 'Vision API Fehler');
                    }
                    
                    removeImage();
                } else {
                    // Dify API with streaming for text
                    const response = await fetch(`${DIFY_API_URL}/chat-messages`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${DIFY_API_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            inputs: {},
                            query: message,
                            response_mode: 'streaming',
                            conversation_id: conversationId,
                            user: 'mora02-user'
                        })
                    });
                    
                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.message || `HTTP ${response.status}`);
                    }
                    
                    hideTyping();
                    
                    // Create message element for streaming updates
                    const messageElement = addMessage('', false);
                    
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let fullAnswer = '';
                    
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n');
                        
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(line.slice(6));
                                    
                                    // Handle different event types
                                    if (data.event === 'agent_message' || data.event === 'message') {
                                        fullAnswer += data.answer || '';
                                        updateMessage(messageElement, fullAnswer);
                                    }
                                    
                                    if (data.conversation_id) {
                                        conversationId = data.conversation_id;
                                    }
                                    
                                    // Handle errors
                                    if (data.event === 'error') {
                                        throw new Error(data.message || 'Stream error');
                                    }
                                } catch (e) {
                                    // Ignore JSON parse errors for incomplete chunks
                                    if (e.message !== 'Stream error' && !e.message.includes('JSON')) {
                                        console.log('Parse info:', e.message);
                                    } else if (e.message === 'Stream error') {
                                        throw e;
                                    }
                                }
                            }
                        }
                    }
                    
                    if (!fullAnswer) {
                        messageElement.innerHTML = '<span class="error">Keine Antwort erhalten</span>';
                    }
                }
            } catch (error) {
                hideTyping();
                const errorMsg = addMessage(`Fehler: ${error.message}`, false);
                errorMsg.classList.add('error');
            }
            
            sendBtn.disabled = false;
            input.focus();
        }
        // Handle paste from clipboard
        document.addEventListener('paste', function(event) {
            const items = event.clipboardData?.items;
            if (!items) return;
    
           for (const item of items) {
               if (item.type.startsWith('image/')) {
                    event.preventDefault();
                    const file = item.getAsFile();
            
                   const reader = new FileReader();
                    reader.onload = function(e) {
                       pendingImage = {
                            data: e.target.result.split(',')[1],
                            type: file.type,
                            name: 'clipboard.png'
                        };
                
                        document.getElementById('previewImg').src = e.target.result;
                       document.getElementById('previewName').textContent = 'Screenshot';
                        document.getElementById('imagePreview').classList.add('active');
                    };
                   reader.readAsDataURL(file);
                    break;
               }
            }
        });
        // Initial greeting
        window.onload = function() {
            addMessage('Hallo! Ich bin der Mora02 System-Assistant. Wie kann ich helfen?\n\nVerfügbare Befehle:\n• **SYNC** - Knowledge Base aktualisieren\n• **STATUS** - System-Status anzeigen\n• Bild hochladen (+) für Screenshot-Analyse', false);
        };
    </script>
</body>
</html>
