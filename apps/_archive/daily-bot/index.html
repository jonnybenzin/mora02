<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mora02 Daily Bot</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-main: #2b2b2b;
            --bg-user-message: #1b1b1b;
            --bg-input: #363636;
            --text-primary: #e0e0e0;
            --text-secondary: #888888;
            --text-muted: #666666;
            --btn-bg: #000000;
            --btn-text: #ffffff;
            --success: #4caf50;
            --accent: #4a9eff;
        }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
        }
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            background: linear-gradient(to bottom, var(--bg-main) 0%, var(--bg-main) 60%, transparent 100%);
            padding: 24px 20px 20px; text-align: center; z-index: 100;
        }
        .logo { width: 180px; height: auto; margin-bottom: 4px; }
        .subtitle { font-size: 12px; font-weight: 400; color: var(--text-muted); letter-spacing: 1px; }
        .chat-container {
            flex: 1; overflow-y: auto; padding: 100px 40px 140px;
            display: flex; flex-direction: column; gap: 24px;
            max-width: 900px; margin: 0 auto; width: 100%;
        }
        .message { max-width: 80%; font-size: 14px; line-height: 1.7; font-weight: 400; }
        .message-bot { align-self: flex-start; color: var(--text-secondary); padding: 0; }
        .message-bot strong { font-weight: 800; color: var(--text-primary); }
        .message-bot code { background: var(--bg-user-message); padding: 2px 6px; border-radius: 3px; font-size: 13px; }
        .message-bot pre { background: var(--bg-user-message); padding: 16px; border-radius: 4px; overflow-x: auto; margin: 12px 0; }
        .message-bot pre code { background: transparent; padding: 0; }
        .message-user {
            align-self: flex-end; background: var(--bg-user-message);
            color: var(--text-primary); padding: 16px 20px; border-radius: 4px;
        }
        .branch-tag {
            display: inline-block; font-size: 10px; font-weight: 800;
            letter-spacing: 1px; padding: 2px 8px; border-radius: 3px;
            margin-bottom: 8px; text-transform: uppercase;
        }
        .branch-system { background: #2d4a2d; color: #7bc67b; }
        .branch-content { background: #4a3d2d; color: #c6a67b; }
        .branch-script { background: #2d3a4a; color: #7ba6c6; }
        .branch-search { background: #3d2d4a; color: #a67bc6; }
        .branch-session { background: #4a4a2d; color: #c6c67b; }
        .branch-general { background: #2d4a4a; color: #7bc6c6; }
        .branch-strategy { background: #4a2d3d; color: #c67ba6; }
        .branch-social { background: #2d2d4a; color: #7b7bc6; }
        .typing { display: flex; gap: 4px; padding: 0; align-self: flex-start; }
        .typing span { width: 8px; height: 8px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .input-area { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px 40px 24px; }
        .input-wrapper {
            max-width: 820px; margin: 0 auto; display: flex; align-items: center; gap: 0;
            background: var(--bg-input); border-radius: 8px; padding: 12px 16px;
            box-shadow: 5px 5px 20px 0px rgba(0, 0, 0, 0.5);
        }
        .input-field {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--text-primary); font-family: 'JetBrains Mono', monospace;
            font-size: 14px; padding: 4px 12px; caret-color: var(--accent);
        }
        .input-field::placeholder { color: var(--text-muted); }
        .btn-send {
            width: 36px; height: 36px; border: none; background: var(--btn-bg);
            color: var(--btn-text); cursor: pointer; display: flex;
            align-items: center; justify-content: center; border-radius: 4px;
            font-size: 18px; transition: all 0.2s; flex-shrink: 0;
        }
        .btn-send:hover { opacity: 0.8; }
        .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-new {
            width: 36px; height: 36px; border: none; background: transparent;
            color: var(--text-muted); cursor: pointer; display: flex;
            align-items: center; justify-content: center; border-radius: 4px;
            font-size: 18px; transition: all 0.2s; flex-shrink: 0; margin-right: 4px;
        }
        .btn-new:hover { color: var(--text-primary); }
        .quick-actions {
            max-width: 820px; margin: 0 auto 12px; display: flex;
            gap: 8px; flex-wrap: wrap; justify-content: center;
        }
        .quick-btn {
            background: var(--bg-user-message); color: var(--text-muted);
            border: 1px solid #444; padding: 6px 12px; border-radius: 4px;
            font-family: 'JetBrains Mono', monospace; font-size: 11px;
            cursor: pointer; transition: all 0.2s;
        }
        .quick-btn:hover { color: var(--text-primary); border-color: var(--text-secondary); }
        .script-link {
            display: inline-block; margin-top: 12px; padding: 8px 16px;
            background: var(--btn-bg); color: var(--accent); border-radius: 4px;
            font-family: 'JetBrains Mono', monospace; font-size: 12px;
            text-decoration: none; transition: opacity 0.2s;
        }
        .script-link:hover { opacity: 0.8; }
        @media (max-width: 600px) {
            .chat-container { padding: 90px 16px 140px; }
            .input-area { padding: 12px 16px 16px; }
            .message { max-width: 95%; }
            .logo { width: 140px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="Mora02" class="logo">
        <div class="subtitle">DAILY BOT</div>
    </div>

    <div class="chat-container" id="chat"></div>

    <div class="input-area">
        <div class="quick-actions" id="quickActions">
            <button class="quick-btn" onclick="sendQuick('show ideas')">📱 show ideas</button>
            <button class="quick-btn" onclick="sendQuick('show review posts')">📋 review posts</button>
            <button class="quick-btn" onclick="window.open('http://mora02.local:8092/script-bot/', '_blank')">🎬 script bot</button>
            <button class="quick-btn" onclick="sendQuick('session done for today')">📋 session done</button>
        </div>
        <div class="input-wrapper">
            <button class="btn-new" onclick="newConversation()" title="New conversation">⟳</button>
            <input type="text" class="input-field" id="input" placeholder="Talk to mora02_daily..." autofocus>
            <button class="btn-send" id="sendBtn" onclick="sendMessage()">→</button>
        </div>
    </div>

    <script>
        const DIFY_API = 'http://mora02.local:8191/v1';
        const API_KEY = '***DIFY_APP_KEY_DAILY_OLD_REVOKED***';
        const SCRIPT_BOT_URL = 'http://mora02.local:8092/script-bot/'; // adjust to your nginx route
        let conversationId = null;
        let isStreaming = false;

        function addScriptLink(div) {
            if (div.querySelector('.script-link')) return;
            const link = document.createElement('a');
            link.href = SCRIPT_BOT_URL;
            link.target = '_blank';
            link.className = 'script-link';
            link.innerHTML = '🎬 Open Script Bot →';
            div.appendChild(document.createElement('br'));
            div.appendChild(link);
        }

        const BRANCH_MAP = {
            'SYSTEM': 'system', 'CONTENT': 'content', 'SCRIPT': 'script',
            'SEARCH': 'search', 'SESSION': 'session', 'GENERAL': 'general',
            'STRATEGY': 'strategy', 'SOCIAL': 'social'
        };

        function detectBranch(text) {
            const upper = text.trim().toUpperCase().substring(0, 50);
            for (const [key, val] of Object.entries(BRANCH_MAP)) {
                if (upper.startsWith(key + ':') || upper.startsWith(key + ' ') || upper === key) {
                    return val;
                }
            }
            return null;
        }

        function stripBranchPrefix(text) {
            for (const key of Object.keys(BRANCH_MAP)) {
                const re = new RegExp('^' + key + '[:\\s]*', 'i');
                if (re.test(text.trim())) {
                    return text.trim().replace(re, '').trim();
                }
            }
            return text;
        }

        function formatMarkdown(text) {
            text = text.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function addMessage(text, isUser, branch) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'message-user' : 'message-bot'}`;
            if (isUser) {
                div.textContent = text;
            } else {
                let html = '';
                if (branch) {
                    html += `<div class="branch-tag branch-${branch}">${branch}</div><br>`;
                }
                html += formatMarkdown(text);
                div.innerHTML = html;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function showTyping() {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typing';
            div.innerHTML = '<span></span><span></span><span></span>';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }

        async function sendMessage() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text || isStreaming) return;

            addMessage(text, true);
            input.value = '';
            isStreaming = true;
            document.getElementById('sendBtn').disabled = true;
            showTyping();

            try {
                const response = await fetch(`${DIFY_API}/chat-messages`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        query: text,
                        user: 'web-user',
                        inputs: {},
                        response_mode: 'streaming',
                        conversation_id: conversationId || ''
                    })
                });

                hideTyping();

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullAnswer = '';
                let thought = '';
                let botDiv = null;
                let detectedBranch = null;
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        try {
                            const data = JSON.parse(line.substring(6));
                            const event = data.event;

                            if (event === 'message' || event === 'agent_message') {
                                const chunk = data.answer || '';
                                fullAnswer += chunk;

                                if (!detectedBranch && fullAnswer.length > 5) {
                                    detectedBranch = detectBranch(fullAnswer);
                                }

                                const displayText = stripBranchPrefix(fullAnswer);
                                if (!botDiv && displayText.trim()) {
                                    botDiv = addMessage(displayText, false, detectedBranch);
                                    if (detectedBranch === 'script') addScriptLink(botDiv);
                                } else if (botDiv) {
                                    let html = '';
                                    if (detectedBranch) {
                                        html += `<div class="branch-tag branch-${detectedBranch}">${detectedBranch}</div><br>`;
                                    }
                                    html += formatMarkdown(displayText);
                                    botDiv.innerHTML = html;
                                    if (detectedBranch === 'script') addScriptLink(botDiv);
                                }
                                document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                            }

                            if (event === 'agent_thought') {
                                const t = data.thought || '';
                                if (t) thought += t;
                            }

                            if (event === 'message_end' && data.conversation_id) {
                                conversationId = data.conversation_id;
                            }
                        } catch (e) {}
                    }
                }

                // If no answer but we have thought, show thought
                if (!fullAnswer.trim() && thought.trim()) {
                    detectedBranch = detectBranch(thought);
                    const displayText = stripBranchPrefix(thought);
                    addMessage(displayText, false, detectedBranch);
                }

            } catch (error) {
                hideTyping();
                addMessage(`Connection error: ${error.message}`, false);
            }

            isStreaming = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('input').focus();
        }

        function sendQuick(text) {
            document.getElementById('input').value = text;
            sendMessage();
        }

        function newConversation() {
            conversationId = null;
            document.getElementById('chat').innerHTML = '';
            addMessage("New conversation started. How can I help?", false);
        }

        document.getElementById('input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        // Init
        window.onload = () => {
            addMessage("Hello! I'm the Mora02 **Daily Bot**.\n\nI can help with:\n• **Content** — write LinkedIn posts\n• **Social** — manage ideas, drafts, publishing\n• **Search** — find current info on the web\n• **Strategy** — evaluate architecture & content decisions\n• **Script** — create GIFs, videos, text frames\n• **System** — check mora02 ports & services (EN)\n• **General** — any other questions\n\n**Social commands**\n/new /show /list /find /edit /draft /write /proofread /review /apply /status /delete /publish \n\n Or just type naturally — I'll route to the right branch.", false);
        };
    </script>
</body>
</html>
