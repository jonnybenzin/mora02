<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mora02 Social Media Assistant</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-main: #2b2b2b;
            --bg-user-message: #1b1b1b;
            --bg-input: #363636;
            --text-primary: #e0e0e0;
            --text-secondary: #888888;
            --text-muted: #666666;
            --btn-bg: #000000;
            --btn-text: #ffffff;
            --accent: #4a9eff;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to bottom, var(--bg-main) 0%, var(--bg-main) 60%, transparent 100%);
            padding: 24px 20px 20px;
            text-align: center;
            z-index: 100;
        }

        .logo {
            width: 180px;
            height: auto;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 12px;
            font-weight: 400;
            color: var(--accent);
            letter-spacing: 1px;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 100px 40px 140px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        /* Messages */
        .message {
            max-width: 80%;
            font-size: 14px;
            line-height: 1.7;
            font-weight: 400;
        }

        /* Bot messages - LEFT, directly on background */
        .message-bot {
            align-self: flex-start;
            color: var(--text-secondary);
            padding: 0;
        }

        .message-bot strong {
            font-weight: 800;
            color: var(--text-primary);
        }

        .message-bot code {
            background: var(--bg-user-message);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 13px;
        }

        .message-bot pre {
            background: var(--bg-user-message);
            padding: 16px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 12px 0;
        }

        .message-bot pre code {
            background: transparent;
            padding: 0;
        }

        /* User messages - RIGHT, in dark box */
        .message-user {
            align-self: flex-end;
            background: var(--bg-user-message);
            color: var(--text-primary);
            padding: 16px 20px;
            border-radius: 4px;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 0;
            align-self: flex-start;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input Area */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 40px 24px;
        }

        .input-wrapper {
            max-width: 820px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 0;
            background: var(--bg-input);
            border-radius: 8px;
            padding: 12px 16px;
            box-shadow: 5px 5px 20px 0px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            min-height: 36px;
            max-height: 150px;
            padding: 8px 16px;
            line-height: 1.5;
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .btn-send {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--btn-bg);
            color: var(--btn-text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-send:hover {
            opacity: 0.8;
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-send svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Hidden file input */
        .file-input {
            display: none;
        }

        /* Error message */
        .message.error {
            color: #ff6666;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-main);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-input);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Quick Commands */
        .quick-commands {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 8px;
            max-width: 820px;
            margin-left: auto;
            margin-right: auto;
        }

        .quick-cmd {
            background: var(--bg-user-message);
            border: 1px solid var(--text-muted);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-cmd:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body>
    <header class="header">
        <img src="logo.png" alt="MORA02" class="logo">
        <div class="subtitle">social_media_bot</div>
    </header>

    <div class="chat-container" id="chatContainer">
        <!-- Messages will be added here -->
    </div>

    <div class="input-area">
        <div class="quick-commands">
            <button class="quick-cmd" onclick="quickCommand('show ideas')">show ideas</button>
            <button class="quick-cmd" onclick="quickCommand('show drafts')">show drafts</button>
            <button class="quick-cmd" onclick="quickCommand('show approved')">show approved</button>
            <button class="quick-cmd" onclick="quickCommand('show published')">show published</button>
        </div>
        <div class="input-wrapper">
            <textarea 
                class="input-field" 
                id="messageInput" 
                placeholder="IDEA: ... | Check this: ... | show post [ID] | set [ID] to [status]" 
                rows="1"
                onkeydown="handleKeyDown(event)"
                oninput="autoResize(this)"
            ></textarea>
            <button class="btn-send" id="sendBtn" onclick="sendMessage()" title="Senden">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // Configuration
        const DIFY_API_URL = 'http://mora02.local:8091/v1';
        const DIFY_API_KEY = 'app-TOJelam1X3s3QDzmyklCZs8U';
        
        let conversationId = '';
        
        // Quick command
        function quickCommand(cmd) {
            document.getElementById('messageInput').value = cmd;
            sendMessage();
        }
        
        // Auto-resize textarea
        function autoResize(element) {
            element.style.height = 'auto';
            element.style.height = Math.min(element.scrollHeight, 150) + 'px';
        }
        
        // Handle Enter key
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        // Add message to chat
        function addMessage(content, isUser) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'message-user' : 'message-bot'}`;
            
            if (!isUser) {
                div.innerHTML = formatMessage(content);
            } else {
                div.innerHTML = escapeHtml(content);
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            
            return div;
        }
        
        // Update message content (for streaming)
        function updateMessage(element, content) {
            element.innerHTML = formatMessage(content);
            document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
        }
        
        // Format bot message (simple markdown)
        function formatMessage(text) {
            let html = escapeHtml(text);
            html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            
            // Convert media filenames to images (various formats: Media: xyz.gif, Media file: xyz.gif, media_path: xyz.gif)
            html = html.replace(/Media(?:\s*file)?:\s*([a-zA-Z0-9_-]+\.(gif|png|jpg|jpeg|webp))/gi, 
                'Media:<br><img src="http://mora02.local:8092/socialmedia/$1" style="max-width: 100%; max-height: 300px; border-radius: 4px; margin: 8px 0;">');
            
            // Convert media_path references
            html = html.replace(/media_path:\s*([a-zA-Z0-9_-]+\.(gif|png|jpg|jpeg|webp))/gi, 
                'Media:<br><img src="http://mora02.local:8092/socialmedia/$1" style="max-width: 100%; max-height: 300px; border-radius: 4px; margin: 8px 0;">');
            
            html = html.replace(/\n/g, '<br>');
            
            // Make full image URLs render as images
            html = html.replace(/(https?:\/\/[^\s<]+\.(gif|png|jpg|jpeg|webp))(?![^<]*>)/gi, 
                '<br><img src="$1" style="max-width: 100%; max-height: 300px; border-radius: 4px; margin: 8px 0;">');
            
            // Make other URLs clickable (but not already processed image URLs)
            html = html.replace(/(?<!src=")(https?:\/\/[^\s<"]+)(?!\.(gif|png|jpg|jpeg|webp))/gi, 
                '<a href="$1" target="_blank" style="color: var(--accent);">$1</a>');
            
            return html;
        }
        
        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Show typing indicator
        function showTyping() {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typingIndicator';
            div.innerHTML = '<span></span><span></span><span></span>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        // Hide typing indicator
        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }
        
        // Send message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            
            addMessage(message, true);
            
            input.value = '';
            autoResize(input);
            
            showTyping();
            
            try {
                // Dify API with streaming
                const response = await fetch(`${DIFY_API_URL}/chat-messages`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${DIFY_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        inputs: {},
                        query: message,
                        response_mode: 'streaming',
                        conversation_id: conversationId,
                        user: 'mora02-user'
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || `HTTP ${response.status}`);
                }
                
                hideTyping();
                
                // Create message element for streaming updates
                const messageElement = addMessage('', false);
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullAnswer = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                
                                // Handle different event types
                                if (data.event === 'agent_message' || data.event === 'message') {
                                    fullAnswer += data.answer || '';
                                    updateMessage(messageElement, fullAnswer);
                                }
                                
                                if (data.conversation_id) {
                                    conversationId = data.conversation_id;
                                }
                                
                                // Handle errors
                                if (data.event === 'error') {
                                    throw new Error(data.message || 'Stream error');
                                }
                            } catch (e) {
                                // Ignore JSON parse errors for incomplete chunks
                                if (e.message !== 'Stream error' && !e.message.includes('JSON')) {
                                    console.log('Parse info:', e.message);
                                } else if (e.message === 'Stream error') {
                                    throw e;
                                }
                            }
                        }
                    }
                }
                
                if (!fullAnswer) {
                    messageElement.innerHTML = '<span class="error">Keine Antwort erhalten</span>';
                }
            } catch (error) {
                hideTyping();
                const errorMsg = addMessage(`Fehler: ${error.message}`, false);
                errorMsg.classList.add('error');
            }
            
            sendBtn.disabled = false;
            input.focus();
        }
        
        // Initial greeting
        window.onload = function() {
            addMessage('Hallo! Ich bin der Social Media Assistant.\n\n**Befehle:**\n• **IDEA:** [text] - Neue Idee speichern\n• **Check this:** [text] - Text prüfen\n• **show ideas/drafts/approved** - Posts anzeigen\n• **show post [ID]** - Post-Details\n• **set [ID] to [status]** - Status ändern\n• **Save draft for ID [X]: [text]** - Draft speichern\n• **Publish [ID]** - Auf LinkedIn posten', false);
        };
    </script>
</body>
</html>
