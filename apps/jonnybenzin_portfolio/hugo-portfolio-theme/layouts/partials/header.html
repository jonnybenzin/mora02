<header class="site-header">
  <a href="/" aria-label="Home">
    {{ if .Site.Params.logo }}
      <img src="{{ .Site.Params.logo }}" alt="{{ .Site.Title }}" class="site-logo">
    {{ else }}
      <span class="site-logo-text">{{ .Site.Title }}</span>
    {{ end }}
  </a>

  <button class="menu-toggle" aria-label="Menü" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>
</header>

<!-- Navigation Overlay -->
<div class="nav-overlay">
  <!-- Logo (same position as header) -->
  <div class="nav-logo">
    <a href="/">
      {{ if .Site.Params.logo }}
        <img src="{{ .Site.Params.logo }}" alt="{{ .Site.Title }}">
      {{ else }}
        <span class="nav-logo-text">{{ .Site.Title }}</span>
      {{ end }}
    </a>
  </div>

  <!-- Nav links – left aligned, large -->
  <nav>
    {{ range .Site.Menus.main }}
      <a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a>
    {{ end }}
  </nav>

  <!-- Copyright bottom-left -->
  <div class="nav-footer">
    &copy; {{ now.Year }} {{ .Site.Params.copyright | default .Site.Title }}
  </div>
</div>
