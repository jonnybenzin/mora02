<div class="tool-wrap">

  <div class="tool-head">
    <span class="tool-title">EXPANDER</span>
    <button class="tool-close" data-action="navigate" data-page="home" tabindex="-1"><svg fill="currentColor"><use href="icons/sprite.svg#i-close"/></svg></button>
  </div>

  <div class="tool-desc">Expand images to 1920x1920 via FLUX outpainting. Drop an image from the bucket, add an optional prompt for context, and expand.</div>

  <div id="exp-input-section">

    <div class="tool-upload" id="exp-drop-zone" data-bucket-accepts="image">
      <svg fill="currentColor" width="20" height="20"><use href="icons/sprite.svg#i-image"/></svg>
      <span class="tool-upload-lbl">Drop image from bucket or click to browse</span>
    </div>
    <input type="file" id="exp-file-input" accept="image/*" style="display:none">

    <div id="exp-preview" style="display:none">
      <div class="img-field-lbl">SOURCE IMAGE</div>
      <div id="exp-preview-img" style="position:relative;margin-bottom:var(--sp-16)"></div>
    </div>

    <div class="fl-field">
      <textarea class="fl-input" id="exp-prompt" rows="1" placeholder=" "></textarea>
      <label class="fl-label">CONTEXT PROMPT (optional)</label>
    </div>

    <div class="tool-collapse-head" id="exp-settings-toggle" data-action="exp-toggle-settings">
      <span class="tool-collapse-arrow">&#9654;</span> SETTINGS
    </div>
    <div id="exp-settings-body" style="display:none">
      <div class="fl-grid fl-grid-3">
        <div class="fl-field">
          <input class="fl-input" id="exp-steps" type="text" value="28" placeholder=" ">
          <label class="fl-label">STEPS</label>
        </div>
        <div class="fl-field">
          <input class="fl-input" id="exp-feathering" type="text" value="0" placeholder=" ">
          <label class="fl-label">FEATHERING</label>
        </div>
        <div class="fl-field">
          <input class="fl-input" id="exp-seed" type="text" value="-1" placeholder=" ">
          <label class="fl-label">SEED</label>
        </div>
      </div>
    </div>

    <div class="tool-actions">
      <button class="btn-ico" data-action="exp-generate" id="exp-generate-btn" disabled>
        <svg fill="currentColor" width="16" height="16"><use href="icons/sprite.svg#i-image"/></svg>
        EXPAND
      </button>
    </div>
  </div>

  <div id="exp-result-area">
    <div id="exp-result-section" style="display:none">
      <div class="tool-result-head" id="exp-result-badge"></div>
      <div id="exp-result-img"></div>
      <div class="tool-result-btns" id="exp-btns">
        <button class="tool-action-btn" data-action="exp-download">DOWNLOAD</button>
        <button class="tool-action-btn bucket-add-btn" data-action="exp-bucket">ADD TO BUCKET</button>
        <button class="tool-action-btn" data-action="exp-new">NEW EXPAND</button>
      </div>
      <div class="tool-result-status" id="exp-status"></div>
    </div>
  </div>

</div>
