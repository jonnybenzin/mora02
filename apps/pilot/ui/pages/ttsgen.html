<div class="tool-wrap">

  <div class="tool-head">
    <span class="tool-title">TTS GEN</span>
    <button class="tool-close" data-action="navigate" data-page="home" tabindex="-1"><svg fill="currentColor"><use href="icons/sprite.svg#i-close"/></svg></button>
  </div>

  <div class="tool-desc">Generate speech audio from text. Choose language and voice, paste your text, hit generate.</div>

  <div id="tts-prompt-section">

    <div class="fl-grid fl-grid-3">
      <div class="fl-field">
        <select class="fl-select" id="tts-engine">
          <option value="auto" selected>Auto (Quick)</option>
          <option value="chatterbox">Chatterbox (Quality)</option>
        </select>
        <label class="fl-label">ENGINE</label>
      </div>
      <div class="fl-field">
        <select class="fl-select" id="tts-language">
          <option value="de" selected>Deutsch</option>
          <option value="en">English</option>
        </select>
        <label class="fl-label">LANGUAGE</label>
      </div>
      <div class="fl-field">
        <select class="fl-select" id="tts-voice">
          <!-- populated by ttsgen.js -->
        </select>
        <label class="fl-label">VOICE</label>
      </div>
    </div>
    <div id="tts-chatterbox-notice" style="display:none;color:var(--c-orange);font-size:var(--fs-xs);margin-bottom:var(--sp-10)">Chatterbox is not running. Start it from Dashboard first.</div>

    <div class="tts-chatterbox-only" style="display:none">
      <div class="fl-grid fl-grid-2">
        <div class="fl-field">
          <select class="fl-select" id="tts-cb-voice">
            <option value="">Default Voice</option>
          </select>
          <label class="fl-label">CLONED VOICE</label>
        </div>
        <div class="fl-field" style="display:flex;align-items:center;gap:var(--sp-8)">
          <input type="file" id="tts-voice-file" accept="*/*" style="display:none">
          <button class="tool-action-btn" data-action="tts-voice-pick" style="white-space:nowrap">UPLOAD VOICE</button>
          <input class="fl-input" id="tts-voice-name" type="text" placeholder="Voice name..." style="flex:1">
        </div>
      </div>
      <div class="tool-result-status" id="tts-upload-status" style="font-size:var(--fs-xs)"></div>
    </div>

    <div class="fl-field">
      <textarea class="fl-input" id="tts-text" rows="5" placeholder=" "></textarea>
      <label class="fl-label">TEXT</label>
    </div>

    <div class="fl-grid fl-grid-3" id="tts-sliders">
      <div class="fl-field">
        <input class="fl-input" id="tts-speed" type="range" min="0.5" max="2.0" step="0.1" value="1.0">
        <label class="fl-label">SPEED <span id="tts-speed-val">1.0x</span></label>
      </div>
      <div class="fl-field tts-de-only">
        <input class="fl-input" id="tts-expression" type="range" min="0.0" max="1.0" step="0.05" value="0.667">
        <label class="fl-label">EXPRESSION <span id="tts-expression-val">0.67</span></label>
      </div>
      <div class="fl-field tts-de-only">
        <input class="fl-input" id="tts-timbre" type="range" min="0.0" max="1.0" step="0.05" value="0.8">
        <label class="fl-label">TIMBRE <span id="tts-timbre-val">0.80</span></label>
      </div>
    </div>
    <div class="fl-grid fl-grid-3 tts-chatterbox-only" style="display:none">
      <div class="fl-field">
        <input class="fl-input" id="tts-exaggeration" type="range" min="0.25" max="2.0" step="0.05" value="0.5">
        <label class="fl-label">EMOTION <span id="tts-exaggeration-val">0.50</span></label>
      </div>
      <div class="fl-field">
        <input class="fl-input" id="tts-cfg" type="range" min="0.0" max="1.0" step="0.05" value="0.5">
        <label class="fl-label">PACE <span id="tts-cfg-val">0.50</span></label>
      </div>
      <div class="fl-field">
        <input class="fl-input" id="tts-temperature" type="range" min="0.05" max="2.0" step="0.05" value="0.8">
        <label class="fl-label">TEMPERATURE <span id="tts-temperature-val">0.80</span></label>
      </div>
    </div>

    <div class="fl-field" style="max-width:200px">
      <select class="fl-select" id="tts-format">
        <option value="wav" selected>WAV</option>
        <option value="mp3">MP3</option>
      </select>
      <label class="fl-label">FORMAT</label>
    </div>

    <div class="tool-actions">
      <button class="btn-ico" data-action="tts-generate" id="tts-generate-btn">
        <svg fill="currentColor" width="16" height="16"><use href="icons/sprite.svg#i-audio"/></svg>
        GENERATE
      </button>
    </div>

  </div>

  <div id="tts-result-section" style="display:none">
    <div class="tool-result-head" id="tts-result-badge">AUDIO READY</div>
    <div id="tts-player"></div>
    <div class="tool-result-btns" id="tts-btns">
      <button class="tool-action-btn" data-action="tts-download">DOWNLOAD</button>
      <button class="tool-action-btn" data-action="tts-new">CREATE NEW</button>
    </div>
    <div class="tool-result-status" id="tts-status"></div>
  </div>

</div>
