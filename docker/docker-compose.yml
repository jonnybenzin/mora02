services:
 # ============================================================================
  # CORE LLM & CHAT SERVICES (mit Profiles für Benchmark)
  # ============================================================================
  
  # Qwen3-14B (Baseline - aktuell im Einsatz)
  llama-qwen3-14b:
    profiles: ["qwen3-14b"]
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /opt/mora02/ai-models/llama-cpp:/models
    environment:
      - LLAMA_ARG_MODEL=/models/Qwen3-14B-Q4_K_M.gguf
      - LLAMA_ARG_CTX_SIZE=32768
      - LLAMA_ARG_N_GPU_LAYERS=-1
      - LLAMA_ARG_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - mora02-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Qwen3-8B (kleiner, schneller)
  llama-qwen3-8b:
    profiles: ["qwen3-8b"]
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /opt/mora02/ai-models/llama-cpp:/models
    environment:
      - LLAMA_ARG_MODEL=/models/Qwen3-8B-Q4_K_M.gguf
      - LLAMA_ARG_CTX_SIZE=32768
      - LLAMA_ARG_N_GPU_LAYERS=-1
      - LLAMA_ARG_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - mora02-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Qwen2.5-7B-Instruct
  llama-qwen25-7b:
    profiles: ["qwen25-7b"]
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /opt/mora02/ai-models/llama-cpp:/models
    environment:
      - LLAMA_ARG_MODEL=/models/Qwen2.5-7B-Instruct-Q4_K_M.gguf
      - LLAMA_ARG_CTX_SIZE=32768
      - LLAMA_ARG_N_GPU_LAYERS=-1
      - LLAMA_ARG_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - mora02-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Qwen2.5-Coder-14B
  llama-qwen25-coder:
    profiles: ["qwen25-coder"]
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /opt/mora02/ai-models/llama-cpp:/models
    environment:
      - LLAMA_ARG_MODEL=/models/qwen2.5-coder-14b-instruct-q4_k_m.gguf
      - LLAMA_ARG_CTX_SIZE=32768
      - LLAMA_ARG_N_GPU_LAYERS=-1
      - LLAMA_ARG_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - mora02-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nous-Hermes-2-Mistral-7B
  llama-nous-hermes:
    profiles: ["nous-hermes"]
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /opt/mora02/ai-models/llama-cpp:/models
    environment:
      - LLAMA_ARG_MODEL=/models/nous-hermes-2-mistral-7b-q4_k_m.gguf
      - LLAMA_ARG_CTX_SIZE=32768
      - LLAMA_ARG_N_GPU_LAYERS=-1
      - LLAMA_ARG_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - mora02-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Magistral Small 24B (Reasoning)
  llama-magistral:
    profiles: ["magistral"]
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /opt/mora02/ai-models/llama-cpp:/models
    environment:
      - LLAMA_ARG_MODEL=/models/Magistral-Small-2506-Q4_K_M.gguf
      - LLAMA_ARG_CTX_SIZE=32768
      - LLAMA_ARG_N_GPU_LAYERS=-1
      - LLAMA_ARG_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - mora02-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Open WebUI (verbindet sich mit llama-server, egal welches Modell)
  open-webui:
    image: local-openwebui
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://llama-server:8080/v1
      - OPENAI_API_KEY=not-needed
      - WEBUI_AUTH=false
    volumes:
      - /opt/mora02/docker/open-webui:/app/backend/data
    networks:
      - mora02-net
      
  # ============================================================================
  # IMAGE GENERATION
  # ============================================================================

  comfyui:
    image: local-comfyui
    container_name: comfyui
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "8188:8188"
    environment:
      - CLI_ARGS=--listen 0.0.0.0 --port 8188 --highvram --preview-method none
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    volumes:
      - /opt/mora02/volumes:/data
      - /opt/mora02/docker/ComfyUI/workflows:/app/ComfyUI/user/default/workflows
      - /opt/mora02/ai-models/comfyui:/app/ComfyUI/models
      - /opt/mora02/output/_default/comfyui/wip:/app/ComfyUI/output
      - /opt/mora02/docker/ComfyUI/custom_nodes:/app/ComfyUI/custom_nodes
      ##- /opt/mora02/docker/ComfyUI/python-packages:/home/appuser/.local
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - mora02-net
      
  # ============================================================================
  # AUTOMATION
  # ============================================================================

  activepieces:
    image: activepieces.local
    container_name: activepieces
    restart: unless-stopped
    ports:
      - "8089:80"
    volumes:
      - /opt/mora02/docker/activepieces/.activepieces:/root/.activepieces
      - /opt/mora02/output:/opt/mora02/output
    environment:
      - AP_REDIS_TYPE=MEMORY
      - AP_DB_TYPE=SQLITE3
      - AP_FRONTEND_URL=http://mora02.local:8089
    networks:
      - mora02-net

  # ============================================================================
  # SHARED SERVICES (Redis, Weaviate)
  # ============================================================================

  redis:
    image: redis:7-alpine
    container_name: redis-dify
    restart: unless-stopped
    command: redis-server --requirepass dify_redis_password
    volumes:
      - /opt/mora02/volumes/redis:/data
    networks:
      - mora02-net
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  weaviate:
    image: semitechnologies/weaviate:1.19.0
    container_name: weaviate
    restart: unless-stopped
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      AUTHENTICATION_APIKEY_ENABLED: 'false'
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_AUTH_API_KEY}
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
    volumes:
      - /opt/mora02/volumes/weaviate:/var/lib/weaviate
    networks:
      - mora02-net

# ============================================================================
  # DIFY 1.x - MULTI-AGENT PLATFORM
  # ============================================================================

  # PostgreSQL for Dify
  postgres-dify-new:
    image: postgres:15-alpine
    container_name: postgres-dify-new
    restart: unless-stopped
    ports:
      - "5433:5432" 
    environment:
      POSTGRES_USER: dify
      POSTGRES_PASSWORD: ${POSTGRES_DIFY_PASSWORD}
      POSTGRES_DB: dify
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /opt/mora02/volumes/postgres-dify-new:/var/lib/postgresql/data
    networks:
      - mora02-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dify"]
      interval: 10s
      timeout: 5s
      retries: 5

  # SSRF Proxy for Dify 1.x
  dify-ssrf-proxy:
    image: ubuntu/squid:latest
    container_name: dify-ssrf-proxy
    restart: unless-stopped
    volumes:
      - /opt/mora02/config/dify-ssrf-proxy/squid.conf.template:/etc/squid/squid.conf.template
      - /opt/mora02/config/dify-ssrf-proxy/docker-entrypoint.sh:/docker-entrypoint-mount.sh
    entrypoint: ["sh", "-c", "cp /docker-entrypoint-mount.sh /docker-entrypoint.sh && sed -i 's/\\r$$//' /docker-entrypoint.sh && chmod +x /docker-entrypoint.sh && /docker-entrypoint.sh"]
    environment:
      HTTP_PORT: 3128
      COREDUMP_DIR: /var/spool/squid
      REVERSE_PROXY_PORT: 8194
      SANDBOX_HOST: dify-sandbox
      SANDBOX_PORT: 8194
      MAX_WORKERS: 4
      MAX_REQUESTS: 50
    networks:
      - mora02-net

  # Sandbox for Dify 1.x (code execution)
  dify-sandbox:
    image: langgenius/dify-sandbox:0.2.12
    container_name: dify-sandbox
    restart: unless-stopped
    environment:
      API_KEY: dify-sandbox
      GIN_MODE: release
      WORKER_TIMEOUT: 15
      ENABLE_NETWORK: "true"
      HTTP_PROXY: http://dify-ssrf-proxy:3128
      HTTPS_PROXY: http://dify-ssrf-proxy:3128
      SANDBOX_PORT: 8194
      MAX_WORKERS: 4
      MAX_REQUESTS: 50
    volumes:
      - /opt/mora02/volumes/dify-new/sandbox/dependencies:/dependencies
      - /opt/mora02/volumes/dify-new/sandbox/conf:/conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8194/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mora02-net

  # Plugin Daemon for Dify 1.x
  dify-plugin-daemon:
    image: langgenius/dify-plugin-daemon:0.5.3-local
    container_name: dify-plugin-daemon
    restart: unless-stopped
    environment:
      DB_TYPE: postgresql
      DB_HOST: postgres-dify-new
      DB_PORT: 5432
      DB_USERNAME: dify
      DB_PASSWORD: ${POSTGRES_DIFY_PASSWORD}
      DB_DATABASE: dify_plugin
      REDIS_HOST: redis-dify
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SERVER_PORT: 5002
      SERVER_KEY: ${DIFY_PLUGIN_DAEMON_KEY}
      MAX_PLUGIN_PACKAGE_SIZE: 52428800
      PPROF_ENABLED: "false"
      DIFY_INNER_API_URL: http://dify-api-new:5001
      DIFY_INNER_API_KEY: ${DIFY_INNER_API_KEY}
      PLUGIN_REMOTE_INSTALLING_HOST: 0.0.0.0
      PLUGIN_REMOTE_INSTALLING_PORT: 5003
      PLUGIN_WORKING_PATH: /app/storage/cwd
      FORCE_VERIFYING_SIGNATURE: "true"
      PYTHON_ENV_INIT_TIMEOUT: 120
      PLUGIN_MAX_EXECUTION_TIMEOUT: 600
      PLUGIN_STORAGE_TYPE: local
      PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
    ports:
      - "5003:5003"
    volumes:
      - /opt/mora02/volumes/dify-new/plugin_daemon:/app/storage
    depends_on:
      postgres-dify-new:
        condition: service_healthy
    networks:
      - mora02-net

  # API for Dify 1.x
  dify-api-new:
    image: langgenius/dify-api:1.11.4
    container_name: dify-api-new
    restart: unless-stopped
    ports:
      - "8191:5001"
    environment:
      MODE: api
      LOG_LEVEL: INFO
      SECRET_KEY: ${DIFY_SECRET_KEY}
      MIGRATION_ENABLED: "true"
      # Database
      DB_TYPE: postgresql
      DB_USERNAME: dify
      DB_PASSWORD: ${POSTGRES_DIFY_PASSWORD}
      DB_HOST: postgres-dify-new
      DB_PORT: 5432
      DB_DATABASE: dify
      # Redis
      REDIS_HOST: redis-dify
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_USE_SSL: "false"
      CELERY_BROKER_URL: redis://:dify_redis_password@redis-dify:6379/1
      # Storage
      STORAGE_TYPE: opendal
      OPENDAL_SCHEME: fs
      OPENDAL_FS_ROOT: storage
      # Vector Store
      VECTOR_STORE: weaviate
      WEAVIATE_ENDPOINT: http://weaviate:8080
      WEAVIATE_API_KEY: ""
      # Sandbox
      CODE_EXECUTION_ENDPOINT: http://dify-sandbox:8194
      CODE_EXECUTION_API_KEY: dify-sandbox
      # Plugin
      PLUGIN_DAEMON_TIMEOUT: 600.0
      INNER_API_KEY_FOR_PLUGIN: ${DIFY_INNER_API_KEY}
      # CORS
      CONSOLE_CORS_ALLOW_ORIGINS: '*'
      WEB_API_CORS_ALLOW_ORIGINS: '*'
      # Plugin Daemon
      PLUGIN_DAEMON_URL: http://dify-plugin-daemon:5002
      PLUGIN_DAEMON_KEY: ${DIFY_PLUGIN_DAEMON_KEY}
    volumes:
      - /opt/mora02/volumes/dify-new/storage:/app/api/storage
    depends_on:
      postgres-dify-new:
        condition: service_healthy
      redis:
        condition: service_healthy
      dify-sandbox:
        condition: service_healthy
    networks:
      - mora02-net

  # Worker for Dify 1.x
  dify-worker-new:
    image: langgenius/dify-api:1.11.4
    container_name: dify-worker-new
    restart: unless-stopped
    environment:
      MODE: worker
      LOG_LEVEL: INFO
      SECRET_KEY: ${DIFY_SECRET_KEY}
      DB_TYPE: postgresql
      DB_USERNAME: dify
      DB_PASSWORD: ${POSTGRES_DIFY_PASSWORD}
      DB_HOST: postgres-dify-new
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: redis-dify
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_USE_SSL: "false"
      CELERY_BROKER_URL: redis://:dify_redis_password@redis-dify:6379/1
      STORAGE_TYPE: opendal
      OPENDAL_SCHEME: fs
      OPENDAL_FS_ROOT: storage
      VECTOR_STORE: weaviate
      WEAVIATE_ENDPOINT: http://weaviate:8080
      WEAVIATE_API_KEY: ""
      CODE_EXECUTION_ENDPOINT: http://dify-sandbox:8194
      CODE_EXECUTION_API_KEY: dify-sandbox
      INNER_API_KEY_FOR_PLUGIN: ${DIFY_INNER_API_KEY}
    volumes:
      - /opt/mora02/volumes/dify-new/storage:/app/api/storage
    depends_on:
      postgres-dify-new:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mora02-net

  # Worker Beat for Dify 1.x (scheduled tasks)
  dify-worker-beat:
    image: langgenius/dify-api:1.11.4
    container_name: dify-worker-beat
    restart: unless-stopped
    environment:
      MODE: beat
      LOG_LEVEL: INFO
      SECRET_KEY: ${DIFY_SECRET_KEY}
      DB_TYPE: postgresql
      DB_USERNAME: dify
      DB_PASSWORD: ${POSTGRES_DIFY_PASSWORD}
      DB_HOST: postgres-dify-new
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: redis-dify
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_USE_SSL: "false"
      CELERY_BROKER_URL: redis://:dify_redis_password@redis-dify:6379/1
      STORAGE_TYPE: opendal
      OPENDAL_SCHEME: fs
      OPENDAL_FS_ROOT: storage
    depends_on:
      postgres-dify-new:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mora02-net

  # Web Frontend for Dify 1.x
  dify-web-new:
    image: langgenius/dify-web:1.11.4
    container_name: dify-web-new
    restart: unless-stopped
    ports:
      - "8190:3000"
    environment:
      EDITION: SELF_HOSTED
      CONSOLE_API_URL: http://mora02.local:8191
      APP_API_URL: http://mora02.local:8191
      MARKETPLACE_API_URL: https://marketplace.dify.ai
      MARKETPLACE_URL: https://marketplace.dify.ai
    depends_on:
      - dify-api-new
    networks:
      - mora02-net


  # ============================================================================
  # BASEROW - PROJECT MANAGEMENT & DATA HUB
  # ============================================================================

  postgres-baserow:
    image: postgres:15-alpine
    container_name: postgres-baserow
    restart: unless-stopped
    environment:
      POSTGRES_USER: baserow
      POSTGRES_PASSWORD: ${POSTGRES_BASEROW_PASSWORD}
      POSTGRES_DB: baserow
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /opt/mora02/volumes/postgres-baserow:/var/lib/postgresql/data
    networks:
      - mora02-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baserow"]
      interval: 10s
      timeout: 5s
      retries: 5

  baserow:
    image: baserow/baserow:1.26.1
    container_name: baserow
    restart: unless-stopped
    ports:
      - "8085:80"
    environment:
      BASEROW_PUBLIC_URL: http://mora02.local:8085
      DATABASE_HOST: postgres-baserow
      DATABASE_NAME: baserow
      DATABASE_USER: baserow
      DATABASE_PASSWORD: ${POSTGRES_BASEROW_PASSWORD}
      DATABASE_PORT: 5432
      BASEROW_WEBHOOKS_ALLOW_PRIVATE_ADDRESS: 'true'
    volumes:
      - /opt/mora02/volumes/baserow:/baserow/data
    depends_on:
      postgres-baserow:
        condition: service_healthy
    networks:
      - mora02-net
      
# ============================================================================
# TOOLS DATABASE (Penpot)
# ============================================================================

  postgres-tools:
    image: postgres:15-alpine
    container_name: postgres-tools
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_TOOLS_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /opt/mora02/volumes/postgres-tools:/var/lib/postgresql/data
    networks:
      - mora02-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

 # ============================================================================
 # PENPOT - Design Tool
 # ============================================================================

  penpot-backend:
    image: penpotapp/backend:2.12.1 
    container_name: penpot-backend
    restart: unless-stopped
    volumes:
      - /opt/mora02/volumes/penpot-assets:/opt/data/assets
    environment:
      PENPOT_FLAGS: "enable-registration enable-login-with-password disable-email-verification disable-smtp disable-google-fonts-provider"
      PENPOT_PUBLIC_URI: "http://mora02.local:8101"
      PENPOT_DATABASE_URI: "postgresql://postgres-tools/penpot"
      PENPOT_DATABASE_USERNAME: penpot
      PENPOT_DATABASE_PASSWORD: ${PENPOT_DATABASE_PASSWORD}
      PENPOT_REDIS_URI: "redis://:dify_redis_password@redis-dify:6379/1"
      PENPOT_ASSETS_STORAGE_BACKEND: assets-fs
      PENPOT_STORAGE_ASSETS_FS_DIRECTORY: /opt/data/assets
      PENPOT_TELEMETRY_ENABLED: "false"
      PENPOT_SECRET_KEY: ${PENPOT_SECRET_KEY}
    depends_on:
      postgres-tools:
        condition: service_healthy
    networks:
      - mora02-net

  penpot-exporter:
    image: penpotapp/exporter:2.12.1
    container_name: penpot-exporter
    restart: unless-stopped
    extra_hosts:
      - "fonts.googleapis.com:127.0.0.1"
      - "fonts.gstatic.com:127.0.0.1"
    volumes:
      - /opt/mora02/volumes/penpot-assets:/opt/data/assets:ro
      - /opt/mora02/volumes/fonts:/usr/share/fonts/custom:ro
    environment:
      PENPOT_PUBLIC_URI: "http://penpot-frontend:8080"
      PENPOT_REDIS_URI: "redis://:dify_redis_password@redis-dify:6379/2"
      PENPOT_SECRET_KEY: ${PENPOT_SECRET_KEY}
    networks:
      - mora02-net

  penpot-frontend:
    image: penpotapp/frontend:2.12.1
    container_name: penpot-frontend
    restart: unless-stopped
    ports:
      - "8101:8080"
    volumes:
      - /opt/mora02/volumes/penpot-assets:/opt/data/assets
    environment:
      PENPOT_FLAGS: "enable-registration enable-login-with-password disable-email-verification disable-google-fonts-provider"
      PENPOT_PUBLIC_URI: "http://mora02.local:8101"
      PENPOT_BACKEND_URI: "http://penpot-backend:6060"
      PENPOT_EXPORTER_URI: "http://penpot-exporter:6061"
    depends_on:
      - penpot-backend
      - penpot-exporter
    networks:
      - mora02-net

 # ============================================================================
 # EXCALIDRAW - Whiteboard & Collaboration
 # ============================================================================

  excalidraw-room:
    image: excalidraw/excalidraw-room@sha256:2fe999f9be4379e3ee282fc45d75d84a691a6383dde33544514cc395287c7a70
    container_name: excalidraw-room
    restart: unless-stopped
    ports:
      - "8103:80"
    networks:
      - mora02-net

  excalidraw:
    image: excalidraw/excalidraw@sha256:95d528cb4f8d18e0fbdc42ae3d09b5c4a899bfbd6bb89eeaf94b904330d79714
    container_name: excalidraw
    restart: unless-stopped
    ports:
      - "8102:80"
    environment:
      - REACT_APP_WS_SERVER_URL=ws://mora02.local:8103
      - REACT_APP_HTTP_STORAGE_BACKEND_URL=http://excalidraw-room:80
    depends_on:
      - excalidraw-room
    networks:
      - mora02-net

# ============================================================================
# IMAGE SERVER
# ============================================================================
  nginx-images:
    image: nginx:1.27-alpine
    container_name: nginx-images
    restart: unless-stopped
    ports:
      - "8092:80"
    volumes:
      - /opt/mora02/output/_default/comfyui:/usr/share/nginx/html/comfyui:ro
      - /opt/mora02/output/_default/socialmedia:/usr/share/nginx/html/socialmedia:ro
      - /opt/mora02/docker/nginx-images/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/mora02/apps/_archive/assistant:/usr/share/nginx/html/assistant:ro
      - /opt/mora02/apps/_archive/daily-bot:/usr/share/nginx/html/daily-bot:ro
      - /opt/mora02/apps/script-runner/frontend:/usr/share/nginx/html/script-bot:ro
      - /opt/mora02/output/_default/script-bot/final:/usr/share/nginx/html/script-bot-assets:ro
      - /opt/mora02/apps/_archive/socialmedia-bot:/usr/share/nginx/html/socialmedia-bot:ro 
      - /opt/mora02/apps/pilot/ui:/usr/share/nginx/html/pilot:ro
      - /opt/mora02/output/_default/script-bot/downloads:/usr/share/nginx/html/script-bot-downloads:ro
      - /opt/mora02/output/_default/gifer:/usr/share/nginx/html/tool-assets/gifer:ro
      - /opt/mora02/output/_default/clipper:/usr/share/nginx/html/tool-assets/clipper:ro
      - /opt/mora02/output/_default/typer:/usr/share/nginx/html/tool-assets/typer:ro
      - /opt/mora02/output/_default/pixeltext:/usr/share/nginx/html/pixeltext:ro
      - /opt/mora02/knowledge:/usr/share/nginx/html/wiki:ro
      - /opt/mora02/output/_default/tts:/usr/share/nginx/html/tool-assets/tts:ro
      - /opt/mora02/output/_default/music:/usr/share/nginx/html/tool-assets/music:ro
    networks:
      - mora02-net

# ============================================================================
# SYSTEM ASSISTANT SERVICES
# ============================================================================

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8094:8080"
    volumes:
      - /opt/mora02/docker/searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://mora02.local:8094
      - SEARXNG_SECRET=${SEARXNG_SECRET_KEY}
    networks:
      - mora02-net

  knowledge-api:
    build:
      context: /opt/mora02/apps/knowledge-api
      dockerfile: Dockerfile
    container_name: knowledge-api
    restart: unless-stopped
    ports:
      - "8095:8095"
    volumes:
      - /opt/mora02:/opt/mora02:ro
      - /opt/mora02/volumes:/opt/mora02/volumes
      - /opt/mora02/scripts:/opt/mora02/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/mora02/output/_default/tts:/opt/mora02/output/_default/tts
      - /opt/mora02/volumes/chatterbox/voices:/opt/mora02/volumes/chatterbox/voices
    environment:
      - TZ=Europe/Berlin
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
    networks:
      - mora02-net

# ============================================================================
# SCRIPT RUNNER - GIF/Video/Image Generation API
# ============================================================================

  script-runner:
    build:
      context: /opt/mora02/apps/script-runner
      dockerfile: Dockerfile
    image: script-runner:latest
    container_name: script-runner
    restart: unless-stopped
    ports:
      - "8096:8096"
    volumes:
      # Data directory for wip and final outputs
      - /opt/mora02/output/_default/script-bot:/data
      - /opt/mora02/output/_default/socialmedia:/socialmedia-assets
      - /opt/mora02/output/_default/gifer:/data/final/gifer
      - /opt/mora02/output/_default/clipper:/data/final/clipper
      - /opt/mora02/output/_default/typer:/data/final/typer
      - /opt/mora02/output/_default/socialmedia:/socialmedia-assets
      # LLM switcher briefkasten (read/write requests, read responses + state)
      - /opt/mora02/llm-switch:/llm-switch
    environment:
      - PEXELS_API_KEY=${PEXELS_API_KEY}
      - PIXABAY_API_KEY=${PIXABAY_API_KEY}
      - BASEROW_TOKEN=${BASEROW_TOKEN}
      - TZ=Europe/Berlin
    networks:
      - mora02-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ============================================================================
# BLENDER WORKER - PixelText 3D Typo Renderer (GPU)
# ============================================================================

  blender-worker:
    build:
      context: /opt/mora02/apps/blender-worker
      dockerfile: Dockerfile
    image: blender-worker:latest
    container_name: blender-worker
    restart: unless-stopped
    ports:
      - "8097:8097"
    volumes:
      - /opt/mora02/output/_default/pixeltext:/output
      - /opt/mora02/apps/blender-worker/scripts:/scripts:ro
      - /opt/mora02/apps/blender-worker/templates:/templates
    environment:
      - TZ=Europe/Berlin
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
      # VRAM guard threshold (MB). Below this, render returns HTTP 503.
      - VRAM_REQUIRED_MB=8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - mora02-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8097/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ============================================================================
# EMBED OLLAMA
# ============================================================================

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - /opt/mora02/volumes/ollama:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - mora02-net
    restart: unless-stopped

# ============================================================================
# TTS SERVICES
# ============================================================================
  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: kokoro-tts
    restart: unless-stopped
    ports:
      - "8106:8880"
    networks:
      - mora02-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8880/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  chatterbox-tts:
    build:
      context: /opt/mora02/apps/chatterbox-api
      dockerfile: docker/Dockerfile.blackwell
    container_name: chatterbox-tts
    restart: "no"
    ports:
      - "8108:4123"
    environment:
      - DEVICE=cuda
      - EXAGGERATION=0.5
      - CFG_WEIGHT=0.5
      - TEMPERATURE=0.8
      - MODEL_CACHE_DIR=/cache
      - VOICE_LIBRARY_DIR=/voices
    volumes:
      - /opt/mora02/volumes/chatterbox/cache:/cache
      - /opt/mora02/volumes/chatterbox/voices:/voices
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - mora02-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4123/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 300s

  piper-tts:
    build:
      context: /opt/mora02/apps/piper-api
      dockerfile: Dockerfile
    container_name: piper-tts
    restart: unless-stopped
    ports:
      - "8107:8107"
    volumes:
      - /opt/mora02/ai-models/piper:/models:ro
    networks:
      - mora02-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8107/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ============================================================================
# PILOT BOT
# ============================================================================
  pilot:
    build:
      context: ../apps/pilot
      dockerfile: Dockerfile
    image: pilot:latest
    container_name: pilot
    restart: unless-stopped
    ports:
      - "8098:8098"
    volumes:
      - /opt/mora02/apps/pilot/frontend:/app/static
      - /opt/mora02/output/_default/comfyui/wip:/images/wip:ro
      # Writable mounts for file deletion
      - /opt/mora02/output/_default/comfyui/wip:/output/comfyui-wip
      - /opt/mora02/output/_default/gifer:/output/gifer
      - /opt/mora02/output/_default/clipper:/output/clipper
      - /opt/mora02/output/_default/typer:/output/typer
      - /opt/mora02/output/_default/tts:/output/tts
      - /opt/mora02/output/_default/socialmedia:/socialmedia
      - /opt/mora02/knowledge/changelog/chathistory:/chathistory
      - /opt/mora02/apps/pilot/workflows:/workflows:ro
      # Style reference images for IP-Adapter
      - /opt/mora02/volumes/styles:/data/styles
      # LLM switcher state (read-only): pilot reads current profile from here
      - /opt/mora02/llm-switch:/llm-switch:ro
    environment:
      - PILOT_ANTHROPIC_API_KEY=${CLAUDE_API_KEY}
      - PILOT_BASEROW_TOKEN=${BASEROW_TOKEN}
      - PILOT_DIFY_API_KEY=${DIFY_APP_KEY_DAILY}
      - PILOT_QWEN_URL=http://llama-server:8080
      - PILOT_DIFY_API_URL=http://dify-api-new:5001
      - PILOT_SCRIPT_RUNNER_URL=http://script-runner:8096
    networks:
      - mora02-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import httpx; httpx.get('http://localhost:8098/health')"]
      interval: 30s
      timeout: 10s
      retries: 3  
# ============================================================================
# NETWORKS
# ============================================================================

networks:
  mora02-net:
    driver: bridge
